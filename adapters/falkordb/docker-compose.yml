services:
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - '6379:6379'
      - '3000:3000'
    volumes:
      - falkordb-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      - FALKORDB_ARGS=--protected-mode no

volumes:
  falkordb-data:
